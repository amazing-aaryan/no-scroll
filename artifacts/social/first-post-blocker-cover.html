<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NoScroll First Carousel Cover</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #08090b;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body { display: grid; place-items: center; }
    .post {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      color: #f5f5f7;
      background:
        radial-gradient(circle at 50% 68%, rgba(117, 90, 255, 0.12), transparent 34%),
        radial-gradient(circle at 50% 88%, rgba(255, 255, 255, 0.06), transparent 38%),
        linear-gradient(180deg, #08090b 0%, #0c0d10 48%, #111215 100%);
    }
    .post::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 6px;
      opacity: 0.18;
      pointer-events: none;
    }
    .brand {
      position: absolute;
      top: 58px;
      left: 72px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0;
      z-index: 4;
    }
    .brand img {
      width: 18px;
      height: 18px;
      border-radius: 3px;
    }
    .eyebrow {
      position: absolute;
      top: 122px;
      left: 72px;
      color: #a8a8b0;
      font-size: 13px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      position: absolute;
      top: 164px;
      left: 72px;
      right: 66px;
      margin: 0;
      font-size: 72px;
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 900;
    }
    .sub {
      position: absolute;
      top: 318px;
      left: 74px;
      right: 92px;
      margin: 0;
      color: #b8b8c1;
      font-size: 27px;
      line-height: 1.25;
      font-weight: 500;
    }
    .phone-crop {
      position: absolute;
      left: 292px;
      top: 414px;
      width: 496px;
      height: 854px;
      overflow: hidden;
      border-radius: 42px;
      filter: drop-shadow(0 34px 52px rgba(0, 0, 0, 0.54));
      z-index: 2;
    }
    .phone-crop img {
      position: absolute;
      width: 1080px;
      height: 1350px;
      left: -292px;
      top: -414px;
      max-width: none;
    }
    .glow {
      position: absolute;
      left: 377px;
      top: 737px;
      width: 326px;
      height: 326px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      filter: blur(58px);
      z-index: 1;
    }
  </style>
</head>
<body>
  <main class="post" aria-label="NoScroll first post cover">
    <div class="brand">
      <img src="../../app/src/main/res/drawable-nodpi/noscroll_logo_inverted_128.png" alt="">
      <span>NoScroll</span>
    </div>
    <div class="eyebrow">First look</div>
    <h1>Stop the scroll. Open your book.</h1>
    <p class="sub">NoScroll blocks the doomscroll surface and turns the habit into a reading cue.</p>
    <div class="glow" aria-hidden="true"></div>
    <div class="phone-crop" aria-hidden="true">
      <img src="carousel/02-blocker.png" alt="">
    </div>
  </main>
</body>
</html>
